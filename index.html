<style>
  :root{
    --bg:#f6f4ef; --card:#ffffff; --ink:#211d2b; --muted:#8a8597;
    --line:#e7e3da; --accent:#6d5bd0;
    --income:#2f9e6f; --needs:#d9762b; --wants:#c2477e; --savings:#3a6ea5;
    --danger:#d23b3b;
    --display:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);font-family:var(--body);color:var(--ink)}
  #root{min-height:100vh}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .cell{border:1px solid transparent;background:#faf9f6;border-radius:8px;padding:8px 10px;font:inherit;font-size:14px;color:var(--ink);width:100%;transition:border-color .12s,background .12s;text-overflow:ellipsis}
  .cell:hover{background:#fff;border-color:var(--line)}
  .cell:focus{outline:none;border-color:var(--accent);background:#fff;text-overflow:clip}
  .cell.num{text-align:right;font-family:var(--mono);font-size:13px}
  .cell.field,.select.field{border:1px solid var(--line);background:#fff;padding:9px 10px;border-radius:9px}
  .row.linked .cell.desc{color:var(--accent);font-weight:600}
  .rowdel{border:none;background:transparent;color:var(--muted);font-size:17px;line-height:1;cursor:pointer;border-radius:6px;width:22px;height:22px;opacity:.4;transition:opacity .12s,color .12s}
  .row:hover .rowdel{opacity:1}
  .rowdel:hover{color:var(--danger);opacity:1}
  .addrow{margin-top:8px;border:1px dashed var(--line);background:transparent;color:var(--muted);border-radius:9px;padding:7px;font:inherit;font-size:12px;cursor:pointer;transition:all .12s;width:100%}
  .addrow:hover{border-color:var(--accent);color:var(--accent)}
  .primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 16px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:filter .12s}
  .primary:hover{filter:brightness(1.08)}
  .primary:disabled{opacity:.4;cursor:not-allowed}
  .ghost{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-size:14px;cursor:pointer;color:var(--ink);transition:border-color .12s}
  .ghost:hover{border-color:var(--accent)}
  .ghost.small{padding:8px 12px;font-size:13px}
  .select{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-size:14px;color:var(--ink);cursor:pointer}
  .tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:8px 4px;font:inherit;font-weight:600;font-size:15px;color:var(--muted);cursor:pointer}
  .tab.on{color:var(--ink);border-color:var(--accent)}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{border:none;background:transparent;padding:7px 12px;font:inherit;font-size:13px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#fff}
  .barLegend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .lockwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .lockcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:34px;max-width:400px;width:100%;box-shadow:0 18px 50px rgba(40,30,70,.10)}
  .lockcard h1{font-family:var(--display);font-size:26px;margin:0 0 4px}
  .lockcard p{color:var(--muted);font-size:13px;margin:0 0 20px;line-height:1.5}
  .pininput{width:100%;border:1px solid var(--line);border-radius:11px;padding:13px 14px;font:inherit;font-size:16px;letter-spacing:1px;margin-bottom:10px}
  .pininput:focus{outline:none;border-color:var(--accent)}
  .lockerr{color:var(--danger);font-size:13px;margin:2px 0 12px;min-height:18px}
  .lockbtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:13px;font:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .lockbtn:disabled{opacity:.5;cursor:not-allowed}
  .locklink{background:none;border:none;color:var(--accent);font:inherit;font-size:13px;cursor:pointer;margin-top:14px;text-decoration:underline}
  @media (max-width:560px){.fg2{grid-template-columns:1fr !important}}
  button[style]:hover{}
  .recharts-wrapper{font-family:var(--body)}
  .sortbtn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:6px;width:24px;height:22px;font-size:12px;cursor:pointer;padding:0;line-height:1}
  .sortbtn:hover{border-color:var(--accent);color:var(--accent)}
  .movebtn{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:8px;line-height:1;padding:1px;opacity:.5}
  .movebtn:hover{opacity:1;color:var(--accent)}
  .movebtn:disabled{opacity:.15;cursor:default}
  .amtoggle{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:5px;width:20px;height:20px;font-size:11px;font-weight:700;cursor:pointer;padding:0;font-family:var(--mono)}
  .amtoggle:hover{border-color:var(--accent);color:var(--accent)}
  .expitem{display:flex;flex-direction:column;align-items:flex-start;gap:1px;width:100%;text-align:left;border:none;background:transparent;padding:8px 10px;border-radius:8px;cursor:pointer;font:inherit;font-size:13px;color:var(--ink)}
  .expitem:hover{background:var(--bg)}
  @media print{
    nav,.fabStack,.reminder,header .ghost,.expitem{display:none !important}
    body{background:#fff}
    .txCard,.bigCard,section{break-inside:avoid}
  }
</style>
</head>
<body>
<div id="root"><div class="lockwrap"><div class="spin"></div></div></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ───────── crypto: AES-GCM with PBKDF2 key derivation ───────── */
const enc = new TextEncoder();
const dec = new TextDecoder();
const b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

async function deriveKey(passcode, salt) {
  const base = await crypto.subtle.importKey("raw", enc.encode(passcode), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 150000, hash: "SHA-256" },
    base,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}
async function encryptJSON(obj, passcode) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passcode, salt);
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(JSON.stringify(obj)));
  return { v: 1, salt: b64(salt), iv: b64(iv), ct: b64(ct) };
}
async function decryptJSON(blob, passcode) {
  const salt = unb64(blob.salt), iv = unb64(blob.iv);
  const key = await deriveKey(passcode, salt);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, unb64(blob.ct));
  return JSON.parse(dec.decode(pt));
}

const STORE = "monthly-finances-encrypted-v1";
const readBlob = () => { try { return JSON.parse(localStorage.getItem(STORE)); } catch { return null; } };
const writeBlob = (blob) => localStorage.setItem(STORE, JSON.stringify(blob));
const hasVault = () => !!localStorage.getItem(STORE);

/* ───────── domain helpers ───────── */
const INR = (n) => "₹" + (Number.isFinite(n) ? n : 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });
const COLS = ["income", "needs", "wants", "savings"];
const COL_META = {
  income: { label: "Income", tint: "var(--income)" },
  needs: { label: "Needs", tint: "var(--needs)" },
  wants: { label: "Wants", tint: "var(--wants)" },
  savings: { label: "Savings", tint: "var(--savings)" },
};
const DEFAULTS = {
  income: ["Salary","Freelance Project","Bonus","Gift","Dividends","Rental Income","Interest","Side Job","Tax Refund","Other"],
  needs: ["Rent","Utilities","Groceries","Insurance","Transportation","Phone Bill","Medical","Debt Payment","Childcare","Loan Payment","Internet Bill"],
  wants: ["Dining Out","Streaming Services","Gym Membership","Entertainment","Clothing","Hobbies","Electronics","Travel Fund","Home Decor","Miscellaneous"],
  savings: ["Emergency Fund","Retirement","Vacation Fund","Investment Account","Education Fund","Health Savings","Home Savings","Car Fund","New Business","Other"],
};
const uid = () => Math.random().toString(36).slice(2, 10);
const monthKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const monthLabel = (k) => { const [y,m]=k.split("-").map(Number); return new Date(y,m-1,1).toLocaleString("en-US",{month:"long",year:"numeric"}); };
const addMonths = (k,n) => { const [y,m]=k.split("-").map(Number); return monthKey(new Date(y,m-1+n,1)); };
const blankRow = (desc="") => ({ id: uid(), desc, actual:0, auto:true });
function freshMonth(defaults){ const D=defaults||DEFAULTS; const m={txns:[]}; for(const c of COLS) m[c]=(D[c]||DEFAULTS[c]).map(d=>blankRow(d)); return m; }
function calcEMI(p, rate, months){ if(months<=0) return 0; const r=rate/100/12; if(r===0) return p/months; return (p*r*Math.pow(1+r,months))/(Math.pow(1+r,months)-1); }
// effective amount for a line: auto = sum of linked txns; manual = typed actual
function lineAmount(row, txns){ if(row.auto){ return (txns||[]).filter(t=>t.lineId===row.id).reduce((a,t)=>a+(Number(t.amount)||0),0); } return Number(row.actual)||0; }

// create a month and seed it with transactions from active recurring items (once, at creation)
function seedMonth(monthK, recurring, defaults){
  const m = freshMonth(defaults);
  const [y,mo] = monthK.split("-").map(Number);
  const daysIn = new Date(y, mo, 0).getDate();
  for(const r of (recurring||[])){
    if(!r.active) continue;
    const col = r.col || "needs";
    let line = m[col].find(l=>l.desc.toLowerCase()===(r.desc||"").toLowerCase());
    if(!line){ line = blankRow(r.desc||"Recurring"); m[col].push(line); }
    const day = String(Math.min(Math.max(Number(r.day)||1,1),daysIn)).padStart(2,"0");
    m.txns.unshift({ id: uid(), date:`${monthK}-${day}`, time:"09:00", amount:Number(r.amount)||0, purpose:r.desc||"Recurring", lineId:line.id, remarks:"(recurring)", _recurId:r.id });
  }
  return m;
}

/* ───────── lock screen ───────── */
function Lock({ mode, onUnlock, onCreate }) {
  const [p1, setP1] = useState("");
  const [p2, setP2] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const create = mode === "create";

  const submit = async () => {
    setErr("");
    if (create) {
      if (p1.length < 4) return setErr("Use at least 4 characters.");
      if (p1 !== p2) return setErr("The two entries don't match.");
      setBusy(true);
      await onCreate(p1);
      setBusy(false);
    } else {
      if (!p1) return;
      setBusy(true);
      const ok = await onUnlock(p1);
      setBusy(false);
      if (!ok) { setErr("Wrong passcode."); setP1(""); }
    }
  };

  return (
    <div className="lockwrap">
      <div className="lockcard">
        <h1>{create ? "Set a passcode" : "Welcome back"}</h1>
        <p>
          {create
            ? "This passcode encrypts everything stored on this device. There's no recovery — if you forget it, the data can't be opened. Keep a backup using Export once you're in."
            : "Enter your passcode to decrypt your finances on this device."}
        </p>
        <input className="pininput" type="password" autoFocus placeholder={create ? "New passcode" : "Passcode"}
          value={p1} onChange={(e)=>setP1(e.target.value)} onKeyDown={(e)=>!create&&e.key==="Enter"&&submit()} />
        {create && (
          <input className="pininput" type="password" placeholder="Confirm passcode"
            value={p2} onChange={(e)=>setP2(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} />
        )}
        <div className="lockerr">{err}</div>
        <button className="lockbtn" onClick={submit} disabled={busy}>
          {busy ? "Working…" : create ? "Create & continue" : "Unlock"}
        </button>
        {!create && (
          <div style={{textAlign:"center"}}>
            <button className="locklink" onClick={()=>{
              if(confirm("This erases ALL encrypted data on this device and starts fresh. This cannot be undone. Continue?")){
                localStorage.removeItem(STORE); location.reload();
              }
            }}>Forgot passcode? Reset (erases data)</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ───────── main app ───────── */
function App() {
  const [phase, setPhase] = useState("loading"); // loading | create | locked | open
  const [pass, setPass] = useState(null);
  const [months, setMonths] = useState({});
  const [assets, setAssets] = useState([]);
  const [debts, setDebts] = useState([]);
  const [recurring, setRecurring] = useState([]);
  const [settings, setSettings] = useState({ defaults: DEFAULTS, lastExport: null });
  const [current, setCurrent] = useState(monthKey(new Date()));
  const [view, setView] = useState("dashboard");
  const [showBuy, setShowBuy] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [showQuick, setShowQuick] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [dismissReminder, setDismissReminder] = useState(false);
  const firstSave = useRef(true);

  useEffect(() => { setPhase(hasVault() ? "locked" : "create"); }, []);

  const applyState = (s) => {
    setMonths(s.months || {});
    setAssets(s.assets || []);
    setDebts(s.debts || []);
    setRecurring(s.recurring || []);
    setSettings({ defaults: (s.settings && s.settings.defaults) || DEFAULTS, lastExport: (s.settings && s.settings.lastExport) || null });
    setCurrent(s.current || monthKey(new Date()));
  };

  const onCreate = async (passcode) => {
    setPass(passcode);
    const init = { months: { [monthKey(new Date())]: freshMonth() }, assets: [], debts: [], recurring: [], settings: { defaults: DEFAULTS, lastExport: null }, current: monthKey(new Date()) };
    applyState(init);
    writeBlob(await encryptJSON(init, passcode));
    setPhase("open");
  };
  const onUnlock = async (passcode) => {
    const blob = readBlob();
    try {
      const s = await decryptJSON(blob, passcode);
      setPass(passcode); applyState(s); setPhase("open"); return true;
    } catch { return false; }
  };

  useEffect(() => {
    if (phase !== "open") return;
    setMonths((prev)=> prev[current] ? prev : { ...prev, [current]: seedMonth(current, recurring, settings.defaults) });
  }, [current, phase]);

  // persist (encrypted) on change
  useEffect(() => {
    if (phase !== "open" || !pass) return;
    if (firstSave.current) { firstSave.current = false; return; }
    const t = setTimeout(async () => writeBlob(await encryptJSON({ months, assets, debts, recurring, settings, current }, pass)), 300);
    return () => clearTimeout(t);
  }, [months, assets, debts, recurring, settings, current, phase, pass]);

  const month = months[current] || freshMonth(settings.defaults);

  const totals = useMemo(() => {
    const txns=month.txns||[];
    const sum=(rows)=>rows.reduce((a,r)=>a+lineAmount(r,txns),0);
    const t={}; for(const c of COLS) t[c]=sum(month[c]||[]);
    return t;
  }, [month]);

  const incomeTotal = totals.income;
  const spend = { needs: totals.needs, wants: totals.wants, savings: totals.savings };
  const allocated = spend.needs + spend.wants + spend.savings;
  const left = incomeTotal - allocated;
  const pct = (v) => (allocated > 0 ? (v/allocated)*100 : 0);

  const editRow = useCallback((col,id,field,value)=>{
    setMonths(prev=>{const m={...prev[current]};m[col]=m[col].map(r=>r.id===id?{...r,[field]:field==="desc"?value:Number(value)||0}:r);return{...prev,[current]:m};});
  },[current]);
  const addRow = useCallback((col)=>{ setMonths(prev=>{const m={...prev[current]};m[col]=[...m[col],blankRow("")];return{...prev,[current]:m};}); },[current]);
  const delRow = useCallback((col,id)=>{ setMonths(prev=>{const m={...prev[current]};m[col]=m[col].filter(r=>r.id!==id);
    m.txns=(m.txns||[]).map(t=>t.lineId===id?{...t,lineId:null}:t); return{...prev,[current]:m};}); },[current]);
  const toggleAuto = useCallback((col,id)=>{ setMonths(prev=>{const m={...prev[current]};m[col]=m[col].map(r=>r.id===id?{...r,auto:!r.auto}:r);return{...prev,[current]:m};}); },[current]);
  const moveRow = useCallback((col,id,dir)=>{ setMonths(prev=>{const m={...prev[current]};const arr=[...m[col]];const i=arr.findIndex(r=>r.id===id);const j=i+dir;if(i<0||j<0||j>=arr.length)return prev;[arr[i],arr[j]]=[arr[j],arr[i]];m[col]=arr;return{...prev,[current]:m};}); },[current]);
  const sortCol = useCallback((col,dir)=>{ setMonths(prev=>{const m={...prev[current]};const txns=m.txns||[];m[col]=[...m[col]].sort((a,b)=>dir==="asc"?lineAmount(a,txns)-lineAmount(b,txns):lineAmount(b,txns)-lineAmount(a,txns));return{...prev,[current]:m};}); },[current]);

  const addTxn = useCallback((txn)=>{ setMonths(prev=>{const m={...prev[current]};m.txns=[{id:uid(),...txn},...(m.txns||[])];return{...prev,[current]:m};}); },[current]);
  const editTxn = useCallback((id,txn)=>{ setMonths(prev=>{const m={...prev[current]};m.txns=(m.txns||[]).map(t=>t.id===id?{...t,...txn}:t);return{...prev,[current]:m};}); },[current]);
  const delTxn = useCallback((id)=>{ setMonths(prev=>{const m={...prev[current]};m.txns=(m.txns||[]).filter(t=>t.id!==id);return{...prev,[current]:m};}); },[current]);

  const copyPrev = useCallback(()=>{
    const pk=addMonths(current,-1);
    setMonths(prev=>{ if(!prev[pk]) return prev; const src=prev[pk]; const m={txns:[]}; for(const c of COLS) m[c]=src[c].map(r=>({...r,id:uid(),actual:0})); return {...prev,[current]:m}; });
  },[current]);

  const buyAsset = useCallback((form)=>{
    const price=Number(form.price)||0, down=Number(form.down)||0, tenure=Number(form.tenure)||0, rate=Number(form.rate)||0;
    const financed=Math.max(price-down,0);
    const emi=form.emiOverride?(Number(form.emi)||0):Math.round(calcEMI(financed,rate,tenure));
    const startMonth=form.startMonth||current;
    const asset={id:uid(),name:form.name||"Asset",category:form.category||"Electronics",purchaseDate:form.purchaseDate||new Date().toISOString().slice(0,10),price,down,financed,emi,tenure,rate,startMonth};
    setAssets(prev=>[...prev,asset]);
    setMonths(prev=>{
      const next={...prev};
      const ensure=(k)=>{ if(!next[k]) next[k]=freshMonth(); else next[k]={...next[k],needs:[...next[k].needs]}; };
      if(down>0){ ensure(startMonth); next[startMonth].needs.push({id:uid(),desc:`${asset.name} — Down payment`,actual:down,_assetId:asset.id,_kind:"down"}); }
      for(let i=0;i<tenure;i++){ const k=addMonths(startMonth,i); ensure(k); next[k].needs.push({id:uid(),desc:`${asset.name} EMI (${i+1}/${tenure})`,actual:emi,_assetId:asset.id,_kind:"emi"}); }
      return next;
    });
    setShowBuy(false); setCurrent(startMonth); setView("budget");
  },[current]);

  const deleteAsset = useCallback((assetId)=>{
    setAssets(prev=>prev.filter(a=>a.id!==assetId));
    setMonths(prev=>{ const next={}; for(const k of Object.keys(prev)){ const m={...prev[k]}; m.needs=m.needs.filter(r=>r._assetId!==assetId); next[k]=m; } return next; });
  },[]);

  // edit: remove old lines for this asset, then re-post with updated values
  const editAsset = useCallback((assetId, form)=>{
    const price=Number(form.price)||0, down=Number(form.down)||0, tenure=Number(form.tenure)||0, rate=Number(form.rate)||0;
    const financed=Math.max(price-down,0);
    const emi=form.emiOverride?(Number(form.emi)||0):Math.round(calcEMI(financed,rate,tenure));
    const startMonth=form.startMonth||current;
    const updated={id:assetId,name:form.name||"Asset",category:form.category||"Electronics",purchaseDate:form.purchaseDate||new Date().toISOString().slice(0,10),price,down,financed,emi,tenure,rate,startMonth};
    setAssets(prev=>prev.map(a=>a.id===assetId?updated:a));
    setMonths(prev=>{
      const next={};
      for(const k of Object.keys(prev)){ const m={...prev[k]}; m.needs=m.needs.filter(r=>r._assetId!==assetId); next[k]=m; }
      const ensure=(k)=>{ if(!next[k]) next[k]=freshMonth(); else next[k]={...next[k],needs:[...next[k].needs]}; };
      if(down>0){ ensure(startMonth); next[startMonth].needs.push({id:uid(),desc:`${updated.name} — Down payment`,actual:down,_assetId:assetId,_kind:"down"}); }
      for(let i=0;i<tenure;i++){ const k=addMonths(startMonth,i); ensure(k); next[k].needs.push({id:uid(),desc:`${updated.name} EMI (${i+1}/${tenure})`,actual:emi,_assetId:assetId,_kind:"emi"}); }
      return next;
    });
  },[current]);

  const assetStatus = useCallback((a)=>{
    let paid=0; for(let i=0;i<a.tenure;i++){ if(addMonths(a.startMonth,i)<=current) paid++; }
    const totalEmi=a.emi*a.tenure; const remaining=Math.max(totalEmi-a.emi*paid,0);
    return {paid,remainingMonths:Math.max(a.tenure-paid,0),remaining,totalEmi};
  },[current]);

  const monthList = useMemo(()=>{ const k=new Set(Object.keys(months)); k.add(current); return [...k].sort(); },[months,current]);

  /* debts (money owed / to receive) */
  const addDebt = useCallback((d)=>{ setDebts(prev=>[{id:uid(),settled:false,createdAt:new Date().toISOString(),...d},...prev]); },[]);
  const toggleDebt = useCallback((id)=>{ setDebts(prev=>prev.map(d=>d.id===id?{...d,settled:!d.settled,settledAt:!d.settled?new Date().toISOString():null}:d)); },[]);
  const delDebt = useCallback((id)=>{ setDebts(prev=>prev.filter(d=>d.id!==id)); },[]);

  /* recurring templates */
  const addRecurring = useCallback((r)=>{ setRecurring(prev=>[...prev,{id:uid(),active:true,...r}]); },[]);
  const editRecurring = useCallback((id,r)=>{ setRecurring(prev=>prev.map(x=>x.id===id?{...x,...r}:x)); },[]);
  const delRecurring = useCallback((id)=>{ setRecurring(prev=>prev.filter(x=>x.id!==id)); },[]);
  const toggleRecurring = useCallback((id)=>{ setRecurring(prev=>prev.map(x=>x.id===id?{...x,active:!x.active}:x)); },[]);

  /* settings: editable default category lists */
  const saveDefaults = useCallback((defaults)=>{ setSettings(s=>({...s,defaults})); },[]);

  /* tabular export helper for line→column lookup */
  const lineColMap = useMemo(()=>{ const map={}; for(const k of Object.keys(months)){ for(const c of COLS) for(const r of (months[k][c]||[])) map[r.id]=c; } return map; },[months]);
  const allTxRows = useMemo(()=>{
    const rows=[];
    for(const k of Object.keys(months).sort()){
      const m=months[k];
      for(const x of (m.txns||[])){
        const col=lineColMap[x.lineId]||"unlinked";
        rows.push({Month:k,Date:x.date||"",Time:x.time||"",Type:col==="income"?"Income":"Expense",Category:col,Amount:Number(x.amount)||0,Purpose:x.purpose||"",Remarks:x.remarks||""});
      }
    }
    return rows;
  },[months,lineColMap]);
  const yearRows = useMemo(()=>{
    const rows=[];
    for(const k of Object.keys(months).sort()){
      const m=months[k]; const txns=m.txns||[]; const v={};
      for(const c of COLS) v[c]=(m[c]||[]).reduce((a,r)=>a+lineAmount(r,txns),0);
      rows.push({Month:k,Income:v.income,Needs:v.needs,Wants:v.wants,Savings:v.savings,Net:v.income-v.needs-v.wants-v.savings});
    }
    return rows;
  },[months]);

  const markExported = ()=> setSettings(s=>({...s,lastExport:new Date().toISOString()}));
  const download = (content,filename,type)=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=filename; a.click(); };
  const toCSV = (rows)=>{ if(!rows.length) return ""; const cols=Object.keys(rows[0]); const esc=(v)=>{ const s=String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }; return [cols.join(","),...rows.map(r=>cols.map(c=>esc(r[c])).join(","))].join("\n"); };

  /* export / import (encrypted master backup) */
  const doExport = async () => {
    setDismissReminder(true); markExported();
    const next={ months, assets, debts, recurring, settings:{...settings,lastExport:new Date().toISOString()}, current };
    const blob = await encryptJSON(next, pass);
    const data = JSON.stringify({ ...blob, _app: "monthly-finances" }, null, 2);
    download(data,`finances-backup-${monthKey(new Date())}.json`,"application/json");
  };
  const exportCSV = ()=>{ markExported(); setDismissReminder(true);
    download(toCSV(allTxRows),`transactions-${monthKey(new Date())}.csv`,"text/csv"); };
  const exportYearCSV = ()=>{ markExported(); setDismissReminder(true);
    download(toCSV(yearRows),`monthly-summary-${monthKey(new Date())}.csv`,"text/csv"); };
  const exportExcel = ()=>{
    if(!window.XLSX){ alert("Excel library didn't load (offline?). Try CSV instead."); return; }
    markExported(); setDismissReminder(true);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(yearRows),"Monthly Summary");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(allTxRows),"Transactions");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(assets.map(a=>({Name:a.name,Category:a.category,Purchased:a.purchaseDate,Price:a.price,Down:a.down,EMI:a.emi,Tenure:a.tenure,Rate:a.rate}))),"Assets");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(debts.map(d=>({Direction:d.dir==="owe"?"I owe":"Owed to me",Person:d.person,Amount:d.amount,Reason:d.reason,Settled:d.settled?"Yes":"No"}))),"Owe & Owed");
    XLSX.writeFile(wb,`finances-${monthKey(new Date())}.xlsx`);
  };
  const exportPrint = ()=>{ markExported(); setDismissReminder(true); window.print(); };

  const doImport = (file) => {
    const r = new FileReader();
    r.onload = async () => {
      try {
        const blob = JSON.parse(r.result);
        const pw = prompt("Enter the passcode this backup was saved with:");
        if (pw == null) return;
        const s = await decryptJSON(blob, pw);
        applyState(s);
        writeBlob(await encryptJSON({ months: s.months, assets: s.assets, debts: s.debts||[], recurring: s.recurring||[], settings: s.settings||{defaults:DEFAULTS,lastExport:null}, current: s.current }, pass));
        alert("Backup imported.");
      } catch { alert("Couldn't read that backup — wrong file or passcode."); }
    };
    r.readAsText(file);
  };

  // export reminder: >14 days or never (only if there's data worth losing)
  const daysSinceExport = settings.lastExport ? Math.floor((Date.now()-new Date(settings.lastExport))/86400000) : 999;
  const hasData = Object.keys(months).length>0 || assets.length>0;
  const showReminder = !dismissReminder && hasData && daysSinceExport>=14;

  if (phase === "loading") return <div className="lockwrap"><div className="spin" /></div>;
  if (phase === "create") return <Lock mode="create" onCreate={onCreate} />;
  if (phase === "locked") return <Lock mode="unlock" onUnlock={onUnlock} />;

  return (
    <div style={S.app}>
      <header style={S.header}>
        <div>
          <div style={S.kicker}>Monthly Finances</div>
          <h1 style={S.h1}>{view==="dashboard" ? "Dashboard" : view==="assets" ? "Assets & EMIs" : monthLabel(current)}</h1>
        </div>
        <div style={S.headerControls}>
          {view==="budget" && <>
            <button className="ghost" onClick={()=>setCurrent(addMonths(current,-1))} aria-label="Previous month">‹</button>
            <select className="select" value={current} onChange={(e)=>setCurrent(e.target.value)}>
              {monthList.map(k=><option key={k} value={k}>{monthLabel(k)}</option>)}
            </select>
            <button className="ghost" onClick={()=>setCurrent(addMonths(current,1))} aria-label="Next month">›</button>
          </>}
          <button className="ghost" title="Lock now" onClick={()=>location.reload()}>🔒</button>
        </div>
      </header>

      <nav style={S.tabs}>
        <button className={view==="dashboard"?"tab on":"tab"} onClick={()=>setView("dashboard")}>Dashboard</button>
        <button className={view==="budget"?"tab on":"tab"} onClick={()=>setView("budget")}>Budget</button>
        <button className={view==="year"?"tab on":"tab"} onClick={()=>setView("year")}>Year</button>
        <button className={view==="assets"?"tab on":"tab"} onClick={()=>setView("assets")}>Assets &amp; EMIs</button>
        <button className={view==="recurring"?"tab on":"tab"} onClick={()=>setView("recurring")}>Recurring</button>
        <button className={view==="debts"?"tab on":"tab"} onClick={()=>setView("debts")}>Owe &amp; Owed</button>
        <div style={{flex:1}} />
        {view==="budget" && <>
          <button className="ghost small" onClick={copyPrev} title="Copy last month's lines into this month">Copy last month</button>
        </>}
        <ExportMenu onJSON={doExport} onCSV={exportCSV} onYearCSV={exportYearCSV} onExcel={exportExcel} onPrint={exportPrint} />
        <label className="ghost small" style={{cursor:"pointer"}}>Import
          <input type="file" accept="application/json" style={{display:"none"}} onChange={(e)=>e.target.files[0]&&doImport(e.target.files[0])} />
        </label>
        <button className="ghost small" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
        <button className="primary" onClick={()=>setShowBuy(true)}>+ Buy asset</button>
      </nav>

      {showReminder && (
        <div style={S.reminder}>
          <span>🛟 You {settings.lastExport?`last backed up ${daysSinceExport} days ago`:"haven't backed up yet"}. Your data lives only in this browser — export a copy to stay safe.</span>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button className="primary" style={{padding:"6px 12px"}} onClick={doExport}>Back up now</button>
            <button className="ghost small" onClick={()=>setDismissReminder(true)}>Later</button>
          </div>
        </div>
      )}

      {view==="dashboard" ? <Dashboard months={months} assets={assets} status={assetStatus} goto={(v,m)=>{ if(m) setCurrent(m); setView(v); }} />
       : view==="year" ? <YearView months={months} goto={(m)=>{ setCurrent(m); setView("budget"); }} />
       : view==="recurring" ? <RecurringView recurring={recurring} onAdd={addRecurring} onEdit={editRecurring} onDel={delRecurring} onToggle={toggleRecurring} />
       : view==="budget" ? <>
        <section style={S.summary}>
          <Stat label="Income" value={incomeTotal} tint="var(--income)" />
          <Stat label="Needs" value={spend.needs} sub={`${pct(spend.needs).toFixed(0)}%`} tint="var(--needs)" />
          <Stat label="Wants" value={spend.wants} sub={`${pct(spend.wants).toFixed(0)}%`} tint="var(--wants)" />
          <Stat label="Savings" value={spend.savings} sub={`${pct(spend.savings).toFixed(0)}%`} tint="var(--savings)" />
          <Stat label="Left to allocate" value={left} tint={left<0?"var(--danger)":"var(--ink)"} />
        </section>
        <Bar needs={spend.needs} wants={spend.wants} savings={spend.savings} total={allocated} />
        <section style={S.grid}>
          {COLS.map(c=><BudgetColumn key={c} col={c} rows={month[c]||[]} txns={month.txns||[]} total={totals[c]} onEdit={editRow} onAdd={addRow} onDel={delRow} onToggleAuto={toggleAuto} onMove={moveRow} onSort={sortCol} />)}
        </section>
        <TransactionLog month={month} onAdd={addTxn} onEdit={editTxn} onDel={delTxn} />
      </> : view==="assets" ? <AssetsView assets={assets} status={assetStatus} onDelete={deleteAsset} onEdit={(a)=>setShowBuy(a)} onBuy={()=>setShowBuy(true)} />
       : <DebtsView debts={debts} onAdd={addDebt} onToggle={toggleDebt} onDelete={delDebt} />}

      <div style={S.fabStack}>
        <button style={{...S.fabBtn,background:"var(--income)"}} onClick={()=>setShowQuick(true)} title="Quick-add transaction">＋</button>
        <button style={S.fabBtn} onClick={()=>setShowCalc(s=>!s)} title="Calculator">🧮</button>
      </div>
      {showCalc && <Calculator onClose={()=>setShowCalc(false)} />}
      {showQuick && <QuickAdd month={month} monthKey={current} onAdd={addTxn} onClose={()=>setShowQuick(false)} />}
      {showSettings && <SettingsModal defaults={settings.defaults} onSave={(d)=>{ saveDefaults(d); setShowSettings(false); }} onClose={()=>setShowSettings(false)} />}

      {showBuy && <BuyModal
        onClose={()=>setShowBuy(false)}
        onSubmit={(form)=>{ if(showBuy && showBuy.id){ editAsset(showBuy.id, form); setShowBuy(false); } else { buyAsset(form); } }}
        defaultMonth={current}
        editing={showBuy && showBuy.id ? showBuy : null} />}
    </div>
  );
}

const RC = window.Recharts || {};
const CHART_COLORS = { income:"#2f9e6f", needs:"#d9762b", wants:"#c2477e", savings:"#3a6ea5", accent:"#6d5bd0" };

function sumCol(monthObj, col){ const txns=monthObj?.txns||[]; return (monthObj?.[col]||[]).reduce((a,r)=>a+lineAmount(r,txns),0); }

function Dashboard({ months, assets, status, goto }){
  const todayKey = monthKey(new Date());
  const keys = Object.keys(months).sort();
  const elapsedKeys = keys.filter(k=>k<=todayKey);

  // consolidated totals (only count months up to & including current real month)
  const agg = useMemo(()=>{
    let income=0,needs=0,wants=0,savings=0;
    for(const k of elapsedKeys){
      income+=sumCol(months[k],"income");
      needs+=sumCol(months[k],"needs");
      wants+=sumCol(months[k],"wants");
      savings+=sumCol(months[k],"savings");
    }
    return {income,needs,wants,savings,spent:needs+wants,outflow:needs+wants+savings};
  },[months,elapsedKeys.join(",")]);

  const assetValue = assets.reduce((a,x)=>a+(Number(x.price)||0),0);
  const outstanding = assets.reduce((a,x)=>a+status(x).remaining,0);
  const monthlyEmi = assets.reduce((a,x)=>a+(status(x).remainingMonths>0?x.emi:0),0);

  // net position: cumulative savings + asset value - outstanding debt
  const netPosition = agg.savings + assetValue - outstanding;
  const savingsRate = agg.income>0 ? (agg.savings/agg.income)*100 : 0;
  const moneyLeft = agg.income - agg.outflow;
  const avgSpend = elapsedKeys.length ? agg.spent/elapsedKeys.length : 0;
  // runway: how many months your accumulated savings would cover average spending
  const runway = avgSpend>0 ? agg.savings/avgSpend : 0;

  // monthly trend series (all months, future included so you can see scheduled EMIs)
  const trend = keys.map(k=>({
    name: monthLabel(k).replace(/ \d+$/, m=>"'"+m.trim().slice(2)),
    Income: sumCol(months[k],"income"),
    Spending: sumCol(months[k],"needs")+sumCol(months[k],"wants"),
    Savings: sumCol(months[k],"savings"),
  }));

  // net-worth over time: cumulative savings + assets owned by then − EMI still outstanding at that month
  const netWorthSeries = useMemo(()=>{
    let cumSavings=0; const out=[];
    for(const k of elapsedKeys){
      cumSavings += sumCol(months[k],"savings");
      // assets purchased on/before this month, value counted; outstanding EMI as of this month
      let aVal=0, owed=0;
      for(const a of assets){
        if(a.startMonth<=k){
          aVal += Number(a.price)||0;
          let paid=0; for(let i=0;i<a.tenure;i++){ if(addMonths(a.startMonth,i)<=k) paid++; }
          owed += Math.max(a.emi*a.tenure - a.emi*paid, 0);
        }
      }
      out.push({ name: monthLabel(k).replace(/ \d+$/, m=>"'"+m.trim().slice(2)), NetWorth: Math.round(cumSavings+aVal-owed) });
    }
    return out;
  },[months,assets,elapsedKeys.join(",")]);

  // savings-rate trend per month
  const rateSeries = keys.filter(k=>k<=todayKey).map(k=>{
    const inc=sumCol(months[k],"income"); const sav=sumCol(months[k],"savings");
    return { name: monthLabel(k).replace(/ \d+$/, m=>"'"+m.trim().slice(2)), Rate: inc>0?Math.round(sav/inc*100):0 };
  });

  // category breakdown across elapsed months (top needs+wants line items)
  const catMap = {};
  for(const k of elapsedKeys){
    const txns=months[k]?.txns||[];
    for(const col of ["needs","wants"]){
      for(const r of (months[k]?.[col]||[])){
        const amt=lineAmount(r,txns); if(amt<=0) continue;
        const label=(r.desc||"Other").replace(/ EMI \(\d+\/\d+\)$/,"").replace(/ — Down payment$/,"");
        catMap[label]=(catMap[label]||0)+amt;
      }
    }
  }
  const topCats = Object.entries(catMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value).slice(0,7);

  // allocation pie (elapsed)
  const allocPie = [
    {name:"Needs",value:agg.needs,fill:CHART_COLORS.needs},
    {name:"Wants",value:agg.wants,fill:CHART_COLORS.wants},
    {name:"Savings",value:agg.savings,fill:CHART_COLORS.savings},
  ].filter(d=>d.value>0);

  // upcoming EMI commitments (next 6 months)
  const upcoming = [];
  for(let i=0;i<6;i++){
    const k=addMonths(todayKey,i);
    let due=0; const items=[];
    for(const a of assets){
      for(let j=0;j<a.tenure;j++){ if(addMonths(a.startMonth,j)===k){ due+=a.emi; items.push(a.name); } }
    }
    if(due>0) upcoming.push({month:k,due,items});
  }

  // financial health score (0-100): savings rate, EMI burden, surplus
  const avgIncome = elapsedKeys.length? agg.income/elapsedKeys.length : 0;
  const emiBurden = avgIncome>0 ? (monthlyEmi/avgIncome)*100 : 0;
  let score = 0;
  score += Math.min(savingsRate/20,1)*40;            // up to 40 for 20%+ savings
  score += Math.max(0,1-emiBurden/40)*30;             // up to 30, penalised as EMI nears 40% of income
  score += moneyLeft>=0 ? 30 : Math.max(0,30+moneyLeft/Math.max(agg.income,1)*30); // 30 if not overspending
  score = Math.round(Math.max(0,Math.min(100,score)));
  const scoreband = score>=75?{t:"Healthy",c:"var(--income)"}:score>=50?{t:"Okay",c:"var(--needs)"}:{t:"Needs attention",c:"var(--danger)"};

  const insights = buildInsights({savingsRate,emiBurden,moneyLeft,agg,assets,outstanding,elapsedKeys});

  const hasData = elapsedKeys.length>0 && agg.income+agg.spent>0;
  const Chart = RC.ResponsiveContainer;

  return (
    <div>
      {/* hero consolidated stats */}
      <section style={S.summary}>
        <BigStat label="Salary / income received" value={agg.income} tint="var(--income)" icon="💰" />
        <BigStat label="Invested / saved so far" value={agg.savings} tint="var(--savings)" icon="📈" sub={`${savingsRate.toFixed(0)}% of income`} />
        <BigStat label="Total spent" value={agg.spent} tint="var(--needs)" icon="🛒" />
        <BigStat label="Net position" value={netPosition} tint={netPosition>=0?"var(--accent)":"var(--danger)"} icon="🪙" sub="savings + assets − debt" />
      </section>

      <section style={S.dashRow2}>
        <MiniStat label="Money left over" value={moneyLeft} tint={moneyLeft>=0?"var(--income)":"var(--danger)"} />
        <MiniStat label="Asset value" value={assetValue} tint="var(--savings)" />
        <MiniStat label="Outstanding EMI" value={outstanding} tint="var(--danger)" />
        <MiniStat label="EMIs / month" value={monthlyEmi} tint="var(--needs)" />
        <MiniStat label="Savings runway" value={`${runway.toFixed(1)} mo`} tint="var(--accent)" raw />
        <MiniStat label="Assets owned" value={assets.length} tint="var(--ink)" raw />
      </section>

      {!hasData ? (
        <div style={S.empty}>
          <p style={{margin:0,fontWeight:600}}>No data yet to chart.</p>
          <p style={{marginTop:6,color:"var(--muted)"}}>Add some income and expenses in the Budget tab, or buy an asset — your dashboard fills in automatically.</p>
          <button className="primary" style={{marginTop:12}} onClick={()=>goto("budget")}>Go to Budget</button>
        </div>
      ) : (
        <>
          {/* financial health score */}
          <div style={S.scoreCard}>
            <div style={S.scoreRing}>
              <Ring value={score} color={scoreband.c} />
              <div style={S.scoreInner}>
                <div style={{...S.scoreNum,color:scoreband.c}}>{score}</div>
                <div style={S.scoreLabel}>{scoreband.t}</div>
              </div>
            </div>
            <div style={{flex:1,minWidth:220}}>
              <h3 style={S.cardTitle}>Financial health</h3>
              <div style={S.healthBars}>
                <HealthBar label="Savings rate" pct={Math.min(savingsRate/20*100,100)} note={`${savingsRate.toFixed(0)}% (target 20%)`} color="var(--savings)" />
                <HealthBar label="EMI burden" pct={Math.min(emiBurden/40*100,100)} note={`${emiBurden.toFixed(0)}% of income (keep < 40%)`} color={emiBurden>40?"var(--danger)":"var(--needs)"} invert />
                <HealthBar label="Living within means" pct={moneyLeft>=0?100:0} note={moneyLeft>=0?"Spending under income":"Overspending"} color={moneyLeft>=0?"var(--income)":"var(--danger)"} />
              </div>
            </div>
          </div>

          {/* trend chart */}
          <Card title="Income, spending & savings over time">
            {!Chart && <NoChart/>}
            {Chart && <Chart width="100%" height={260}>
              <RC.AreaChart data={trend} margin={{top:10,right:10,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="gI" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={CHART_COLORS.income} stopOpacity={0.35}/><stop offset="100%" stopColor={CHART_COLORS.income} stopOpacity={0}/></linearGradient>
                  <linearGradient id="gS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={CHART_COLORS.needs} stopOpacity={0.35}/><stop offset="100%" stopColor={CHART_COLORS.needs} stopOpacity={0}/></linearGradient>
                  <linearGradient id="gV" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={CHART_COLORS.savings} stopOpacity={0.35}/><stop offset="100%" stopColor={CHART_COLORS.savings} stopOpacity={0}/></linearGradient>
                </defs>
                <RC.CartesianGrid strokeDasharray="3 3" stroke="var(--line)" vertical={false}/>
                <RC.XAxis dataKey="name" tick={{fontSize:11,fill:"var(--muted)"}} axisLine={false} tickLine={false}/>
                <RC.YAxis tick={{fontSize:11,fill:"var(--muted)"}} axisLine={false} tickLine={false} tickFormatter={(v)=>v>=1000?(v/1000)+"k":v}/>
                <RC.Tooltip formatter={(v)=>INR(v)} contentStyle={{borderRadius:10,border:"1px solid var(--line)",fontSize:13}}/>
                <RC.Legend wrapperStyle={{fontSize:12}}/>
                <RC.Area type="monotone" dataKey="Income" stroke={CHART_COLORS.income} fill="url(#gI)" strokeWidth={2}/>
                <RC.Area type="monotone" dataKey="Spending" stroke={CHART_COLORS.needs} fill="url(#gS)" strokeWidth={2}/>
                <RC.Area type="monotone" dataKey="Savings" stroke={CHART_COLORS.savings} fill="url(#gV)" strokeWidth={2}/>
              </RC.AreaChart>
            </Chart>}
          </Card>

          {/* net worth over time */}
          <Card title="Net worth over time">
            {!Chart && <NoChart/>}
            {Chart && netWorthSeries.length>0 && <Chart width="100%" height={240}>
              <RC.AreaChart data={netWorthSeries} margin={{top:10,right:10,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="gNW" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={CHART_COLORS.accent} stopOpacity={0.4}/><stop offset="100%" stopColor={CHART_COLORS.accent} stopOpacity={0}/></linearGradient>
                </defs>

            </Card>

          {/* upcoming EMI commitments */}

                {upcoming.map(u=>(

                    <div style={S.upMonth}>{monthLabel(u.month)}</div>

          {/* insights */}
          <Card title="Insights">
            <div style={S.insights}>
              {insights.map((it,i)=>(

    </div>
  );
}

function buildInsights({savingsRate,emiBurden,moneyLeft,agg,assets,outstanding,elapsedKeys}){
  const out=[];
  if(agg.income===0){ return [{icon:"👋",text:"Add your income and expenses to start seeing personalised insights."}]; }
  if(savingsRate>=20) out.push({icon:"🌟",text:`You're saving ${savingsRate.toFixed(0)}% of your income — at or above the classic 20% target. Excellent discipline.`});
  else if(savingsRate>0) out.push({icon:"🎯",text:`Your savings rate is ${savingsRate.toFixed(0)}%. Nudging it toward 20% would strengthen your long-term position.`});
  else out.push({icon:"⚠️",text:"No savings recorded yet. Even a small automatic transfer each month builds momentum."});

  if(emiBurden>40) out.push({icon:"🔴",text:`EMIs take up about ${emiBurden.toFixed(0)}% of your average income — above the 40% comfort line. New debt would stretch you thin.`});
  else if(emiBurden>0) out.push({icon:"✅",text:`EMI burden is a manageable ${emiBurden.toFixed(0)}% of income.`});

  if(moneyLeft<0) out.push({icon:"📉",text:`Across tracked months you've spent ${INR(-moneyLeft)} more than you earned. Worth reviewing the Wants categories.`});
  else out.push({icon:"💪",text:`You've kept ${INR(moneyLeft)} of cumulative income unspent. That's real breathing room.`});

  if(outstanding>0){ const big=[...assets].sort((a,b)=>b.emi-a.emi)[0]; if(big) out.push({icon:"🏦",text:`${INR(outstanding)} of EMI debt remains. Your largest is "${big.name}" at ${INR(big.emi)}/month.`}); }
  if(assets.length>0){ const v=assets.reduce((a,x)=>a+x.price,0); out.push({icon:"🏷️",text:`You own ${assets.length} tracked asset${assets.length>1?"s":""} worth ${INR(v)} in total.`}); }
  const avgSpend = elapsedKeys.length? (agg.spent/elapsedKeys.length):0;
  if(avgSpend>0) out.push({icon:"📊",text:`Your average monthly spend is about ${INR(avgSpend)} across ${elapsedKeys.length} month${elapsedKeys.length>1?"s":""}.`});
  return out;
}

function Ring({value,color}){
  const r=52,c=2*Math.PI*r,off=c-(value/100)*c;
  return <svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r={r} fill="none" stroke="var(--line)" strokeWidth="11"/>
    <circle cx="65" cy="65" r={r} fill="none" stroke={color} strokeWidth="11" strokeLinecap="round"
      strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 65 65)" style={{transition:"stroke-dashoffset .6s ease"}}/>
  </svg>;
}

function TransactionLog({month,onAdd,onEdit,onDel}){
  const today=new Date();
  const blank={date:today.toISOString().slice(0,10),time:today.toTimeString().slice(0,5),amount:"",purpose:"",lineId:"",remarks:""};
  const [f,setF]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [q,setQ]=useState("");
  const [filterCol,setFilterCol]=useState("all");
  const set=(k)=>(e)=>setF({...f,[k]:e.target.value});

  const opts=[];
  for(const c of COLS) for(const r of (month[c]||[])) opts.push({col:c,id:r.id,label:`${COL_META[c].label} › ${r.desc||"(unnamed)"}`});
  const lineLabel=(id)=>{ const o=opts.find(x=>x.id===id); return o?o.label:"Unlinked"; };
  const lineCol=(id)=>{ const o=opts.find(x=>x.id===id); return o?o.col:null; };
  const isIncome=(x)=> lineCol(x.lineId)==="income";

  const txns=month.txns||[];
  const submit=()=>{
    if(!f.amount) return;
    const payload={date:f.date,time:f.time,amount:Number(f.amount)||0,purpose:f.purpose,lineId:f.lineId||null,remarks:f.remarks};
    if(editId){ onEdit(editId,payload); setEditId(null); } else { onAdd(payload); }
    setF({...blank,time:new Date().toTimeString().slice(0,5)});
  };
  const startEdit=(x)=>{ setEditId(x.id); setF({date:x.date,time:x.time,amount:String(x.amount),purpose:x.purpose||"",lineId:x.lineId||"",remarks:x.remarks||""}); window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}); };
  const cancelEdit=()=>{ setEditId(null); setF({...blank,time:new Date().toTimeString().slice(0,5)}); };

  // search + filter
  const filtered=txns.filter(x=>{
    if(filterCol!=="all" && lineCol(x.lineId)!==filterCol) return false;
    if(!q.trim()) return true;
    const hay=`${x.purpose} ${x.remarks} ${x.amount} ${lineLabel(x.lineId)}`.toLowerCase();
    return hay.includes(q.trim().toLowerCase());
  }).sort((a,b)=>{
    const ka=`${a.date||""} ${a.time||"00:00"}`, kb=`${b.date||""} ${b.time||"00:00"}`;
    return kb.localeCompare(ka); // most recent date+time on top
  });
  const incomeSum=filtered.filter(x=>isIncome(x)).reduce((a,x)=>a+(Number(x.amount)||0),0);
  const expenseSum=filtered.filter(x=>!isIncome(x)).reduce((a,x)=>a+(Number(x.amount)||0),0);

  return <div style={S.txCard}>
    <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:12,flexWrap:"wrap"}}>
      <h3 style={{...S.cardTitle,margin:0}}>Transaction log</h3>
      <span style={{fontSize:12,color:"var(--muted)"}}>{filtered.length} shown{filtered.length!==txns.length?` of ${txns.length}`:""}</span>
      <span style={{fontSize:13,fontWeight:700,color:"var(--income)",fontFamily:"var(--mono)"}}>+{INR(incomeSum)} in</span>
      <span style={{fontSize:13,fontWeight:700,color:"var(--danger)",fontFamily:"var(--mono)"}}>−{INR(expenseSum)} out</span>
      <span style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)"}}>net {INR(incomeSum-expenseSum)}</span>
    </div>
    <p style={{fontSize:12,color:"var(--muted)",margin:"0 0 12px"}}>Log each payment and link it to a budget line — lines set to "A" auto-sum their transactions. Click a row to edit it. Newest on top.</p>

    <div style={S.txForm}>
      <input className="cell field" type="date" value={f.date} onChange={set("date")} title="Date" />
      <input className="cell field" type="time" value={f.time} onChange={set("time")} title="Time" />
      <input className="cell field" type="number" value={f.amount} placeholder="Amount ₹" onChange={set("amount")} />
      <input className="cell field" value={f.purpose} placeholder="Occasion / purpose" onChange={set("purpose")} />
      <select className="select field" value={f.lineId} onChange={set("lineId")} title="Category (budget line)">
        <option value="">— No category —</option>
        {opts.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
      </select>
      <input className="cell field" value={f.remarks} placeholder="Remarks" onChange={set("remarks")} onKeyDown={(e)=>e.key==="Enter"&&submit()} />
      <div style={{gridColumn:"1 / -1",display:"flex",gap:8}}>
        <button className="primary" style={{flex:1}} onClick={submit} disabled={!f.amount}>{editId?"Save changes":"+ Add transaction"}</button>
        {editId && <button className="ghost" onClick={cancelEdit}>Cancel</button>}
      </div>
    </div>

    {txns.length>0 && <div style={S.txFilter}>
      <input className="cell field" style={{flex:1,minWidth:140}} value={q} placeholder="Search purpose, remarks, amount…" onChange={(e)=>setQ(e.target.value)} />
      <select className="select field" value={filterCol} onChange={(e)=>setFilterCol(e.target.value)}>
        <option value="all">All categories</option>
        {COLS.map(c=><option key={c} value={c}>{COL_META[c].label}</option>)}
        <option value="null">Unlinked</option>
      </select>
      {(q||filterCol!=="all") && <button className="ghost small" onClick={()=>{setQ("");setFilterCol("all");}}>Clear</button>}
    </div>}

    {filtered.length>0 ? <div style={S.txTableWrap}>
      <table style={S.txTable}>
        <thead><tr>
          <th style={S.th}>Date</th><th style={S.th}>Time</th><th style={{...S.th,textAlign:"right"}}>Amount</th>
          <th style={S.th}>Purpose</th><th style={S.th}>Category</th><th style={S.th}>Remarks</th><th style={S.th}></th>
        </tr></thead>
        <tbody>
          {filtered.map(x=>(
            <tr key={x.id} style={{...S.tr, ...(editId===x.id?{background:"var(--bg)"}:{})}} className="txrow">
              <td style={{...S.td,cursor:"pointer"}} onClick={()=>startEdit(x)}>{x.date}</td>
              <td style={{...S.td,cursor:"pointer"}} onClick={()=>startEdit(x)}>{x.time}</td>
              <td style={{...S.td,textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,color:isIncome(x)?"var(--income)":"var(--danger)",cursor:"pointer"}} onClick={()=>startEdit(x)}>{isIncome(x)?"+":"−"}{INR(x.amount)}</td>
              <td style={{...S.td,cursor:"pointer"}} onClick={()=>startEdit(x)}>{x.purpose||"—"}</td>
              <td style={{...S.td,color:x.lineId?"var(--accent)":"var(--muted)",fontSize:12,cursor:"pointer"}} onClick={()=>startEdit(x)}>{lineLabel(x.lineId)}</td>
              <td style={{...S.td,color:"var(--muted)",cursor:"pointer"}} onClick={()=>startEdit(x)}>{x.remarks||"—"}</td>
              <td style={S.td}><button className="rowdel" style={{opacity:.7}} onClick={()=>onDel(x.id)} title="Delete transaction">×</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div> : txns.length>0 ? <div style={{padding:"20px 0",textAlign:"center",color:"var(--muted)",fontSize:13}}>No transactions match your search.</div> : null}
  </div>;
}

function DebtsView({debts,onAdd,onToggle,onDelete}){
  const [dir,setDir]=useState("owe"); // owe = I owe them; owed = they owe me
  const [person,setPerson]=useState("");
  const [amount,setAmount]=useState("");
  const [reason,setReason]=useState("");

  const submit=()=>{ if(!person||!amount) return; onAdd({dir,person,amount:Number(amount)||0,reason}); setPerson("");setAmount("");setReason(""); };

  const active=debts.filter(d=>!d.settled);
  const iOwe=active.filter(d=>d.dir==="owe").reduce((a,x)=>a+x.amount,0);
  const owedToMe=active.filter(d=>d.dir==="owed").reduce((a,x)=>a+x.amount,0);

  return <div>
    <section style={S.summary}>
      <Stat label="I owe (open)" value={iOwe} tint="var(--danger)" />
      <Stat label="Owed to me (open)" value={owedToMe} tint="var(--income)" />
      <Stat label="Net position" value={owedToMe-iOwe} tint={owedToMe-iOwe>=0?"var(--income)":"var(--danger)"} />
    </section>

    <div style={S.txCard}>
      <h3 style={S.cardTitle}>Add a record</h3>
      <div style={S.debtForm}>
        <div className="seg" style={{gridColumn:"1 / -1",width:"fit-content"}}>
          <button className={dir==="owe"?"on":""} onClick={()=>setDir("owe")}>I owe someone</button>
          <button className={dir==="owed"?"on":""} onClick={()=>setDir("owed")}>Someone owes me</button>
        </div>
        <input className="cell field" value={person} placeholder="Person / party" onChange={(e)=>setPerson(e.target.value)} />
        <input className="cell field" type="number" value={amount} placeholder="Amount ₹" onChange={(e)=>setAmount(e.target.value)} />
        <input className="cell field" value={reason} placeholder="Reason / note" onChange={(e)=>setReason(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} />
        <button className="primary" onClick={submit} disabled={!person||!amount}>+ Add</button>
      </div>
    </div>

    {debts.length===0 ? (
      <div style={S.empty}><p style={{margin:0,color:"var(--muted)"}}>No records yet. Add money you owe or that's owed to you above.</p></div>
    ) : (
      <div style={S.debtList}>
        {debts.map(x=>(
          <div key={x.id} style={{...S.debtRow, opacity:x.settled?0.55:1}}>
            <input type="checkbox" checked={x.settled} onChange={()=>onToggle(x.id)} title="Mark settled / reopen" style={{width:18,height:18,cursor:"pointer",flexShrink:0}} />
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,textDecoration:x.settled?"line-through":"none"}}>
                <span style={{color:x.dir==="owe"?"var(--danger)":"var(--income)"}}>{x.dir==="owe"?"You owe":"Owes you"}</span> {x.person} · {INR(x.amount)}
              </div>
              <div style={{fontSize:12,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.reason||"—"}{x.settled && x.settledAt?` · settled ${x.settledAt.slice(0,10)}`:""}</div>
            </div>
            <button className="ghost small" style={{color:"var(--danger)",flexShrink:0}} onClick={()=>onDelete(x.id)}>Delete</button>
          </div>
        ))}
      </div>
    )}
  </div>;
}

  const [open,setOpen]=useState(false);
  useEffect(()=>{ if(!open) return; const h=()=>setOpen(false); window.addEventListener("click",h); return ()=>window.removeEventListener("click",h); },[open]);
  const item=(label,fn,note)=> <button className="expitem" onClick={()=>{ setOpen(false); fn(); }}><span>{label}</span>{note?<span style={{fontSize:11,color:"var(--muted)"}}>{note}</span>:null}</button>;
  return <div style={{position:"relative"}} onClick={(e)=>e.stopPropagation()}>
    <button className="ghost small" onClick={()=>setOpen(o=>!o)}>Export ▾</button>
    {open && <div style={S.expMenu}>
      {item("Full backup (JSON)",onJSON,"encrypted · re-importable")}
      {item("Transactions (CSV)",onCSV,"plaintext")}
      {item("Monthly summary (CSV)",onYearCSV,"plaintext")}
      {item("Excel workbook (.xlsx)",onExcel,"all sheets")}
      {item("Print / Save as PDF",onPrint,"browser dialog")}

function Calculator({onClose}){
  const [expr,setExpr]=useState("");
  const [out,setOut]=useState("");
  const press=useCallback((k)=>{
    if(k==="C"){ setExpr("");setOut(""); return; }
    if(k==="="){ setExpr(cur=>{ try{ const safe=cur.replace(/[^0-9+\-*/.() %]/g,""); const v=Function('"use strict";return ('+safe.replace(/%/g,"/100")+')')(); setOut(String(Number.isFinite(v)?Math.round(v*100)/100:"")); }catch{ setOut("error"); } return cur; }); return; }
    if(k==="⌫"){ setExpr(e=>e.slice(0,-1)); return; }
    setExpr(e=>e+k);
  },[]);

  // keyboard support
  useEffect(()=>{
    const onKey=(e)=>{
      const k=e.key;
      if(k==="Escape"){ e.preventDefault(); onClose(); return; }
      if(k==="Enter" || k==="="){ e.preventDefault(); press("="); return; }
      if(k==="Backspace"){ e.preventDefault(); press("⌫"); return; }
      if(k==="Delete" || k==="c" || k==="C"){ e.preventDefault(); press("C"); return; }
      if(/^[0-9]$/.test(k)){ e.preventDefault(); press(k); return; }
      if(["+","-","*","/",".","%","(",")"].includes(k)){ e.preventDefault(); press(k); return; }
      if(k==="x" || k==="X"){ e.preventDefault(); press("*"); return; }
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[press,onClose]);

  const keys=["C","⌫","%","/","7","8","9","*","4","5","6","-","1","2","3","+","0",".","="];
  return <div style={S.calcPanel}>
    <div style={S.calcHead}><span style={{fontWeight:700,fontFamily:"var(--display)"}}>Calculator</span><button className="rowdel" style={{opacity:1}} onClick={onClose}>×</button></div>
    <div style={S.calcDisplay}>
      <div style={S.calcExpr}>{expr||"0"}</div>
      <div style={S.calcOut}>{out!==""?"= "+out:""}</div>
    </div>
    <div style={S.calcKeys}>
      {keys.map(k=>(
        <button key={k} onClick={()=>press(k)}
          style={{...S.calcKey, ...(k==="="?S.calcEq:{}), ...(["/","*","-","+","%"].includes(k)?S.calcOp:{}), ...(k==="C"||k==="⌫"?S.calcFn:{}), ...(k==="0"?{gridColumn:"span 1"}:{})}}>
          {k}
        </button>
      ))}
    </div>
    <div style={S.calcHint}>Tip: type with your keyboard · Enter = · Esc closes · x for ×</div>
  </div>;
}

function AssetsView({assets,status,onDelete,onEdit,onBuy}){
  const [sort,setSort] = useState("value");
  const [confirmDel,setConfirmDel] = useState(null); // asset pending deletion

  const totalValue=assets.reduce((a,x)=>a+(Number(x.price)||0),0);
  const totalOwed=assets.reduce((a,x)=>a+status(x).remaining,0);
  const totalPaid=assets.reduce((a,x)=>{ const s=status(x); return a+x.emi*s.paid; },0);

  const sorted = [...assets].sort((a,b)=>{
    if(sort==="value") return b.price-a.price;
    if(sort==="emi") return b.emi-a.emi;
    if(sort==="outstanding") return status(b).remaining-status(a).remaining;
    if(sort==="name") return a.name.localeCompare(b.name);
    if(sort==="date") return (b.purchaseDate||"").localeCompare(a.purchaseDate||"");
    return 0;
  });

  return <div>

      <Stat label="Paid off so far" value={totalPaid} tint="var(--income)" />

        {f.emiOverride

          : <div style={S.emiCalc}>Calculated EMI: <b>{INR(autoEmi)}</b> / month</div>}
      </div>
      <div style={S.emiPreview}>Financed {INR(financed)} · {f.tenure||0} months · total to pay {INR(shownEmi*(Number(f.tenure)||0)+(Number(f.down)||0))}</div>
      <div style={S.modalActions}>
        <button className="ghost" onClick={onClose}>Cancel</button>
        <button className="primary" onClick={()=>onSubmit(f)} disabled={!f.name||!f.price}>{editing?"Save changes":"Add asset & post EMIs"}</button>
      </div>
    </div>
  </div>;
}
const Field=({label,children,full})=>(<label style={{...S.field,gridColumn:full?"1 / -1":"auto"}}><span style={S.fieldLabel}>{label}</span>{children}</label>);
